# Application Name
spring.application.name=powertrack

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/powertrack_db
spring.datasource.username=your_db_username
spring.datasource.password=your_db_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Session Configuration (Important for session-based auth)
server.servlet.session.cookie.name=POWERTRACK_SESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false  
server.servlet.session.cookie.same-site=Lax
server.servlet.session.cookie.max-age=30m
server.servlet.session.timeout=30m
spring.session.store-type=jdbc  

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging Configuration
logging.level.root=INFO
logging.level.com.powertrack=DEBUG
logging.level.org.springframework.security=DEBUG